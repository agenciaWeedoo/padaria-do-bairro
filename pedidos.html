<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Especiais | Padaria do Bairro</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <header>
        <h1>Encomendas</h1>
        <nav><ul><li><a href="index.html">⬅ Voltar ao Início</a></li></ul></nav>
    </header>

    <main>
        <section id="form-section">
            <h2>Faça seu Pedido Especial</h2>
            <form action="#" method="post">
                <fieldset>
                    <legend>Seção 1 - Dados do Cliente</legend>
                    <label for="nome_pedido">👤 Nome completo:</label>
                    <input type="text" id="nome_pedido" name="nome_pedido" required>
                    
                    <label for="tel_pedido">📞 Telefone:</label>
                    <input type="tel" id="tel_pedido" name="tel_pedido" placeholder="Somente números" pattern="[0-9]{10,11}" required>
                    
                    <label for="email_pedido">📧 Email:</label>
                    <input type="email" id="email_pedido" name="email_pedido" required>
                </fieldset>

                <fieldset>
                    <legend>Seção 2 - Detalhes do Pedido</legend>
                    <label>🍰 Tipo de produto:</label>
                    <div style="margin-bottom: 15px;">
                        <input type="radio" id="tipo_bolo" name="tipo_produto" value="bolo" required> <label for="tipo_bolo">Bolo</label>
                        <input type="radio" id="tipo_torta" name="tipo_produto" value="torta"> <label for="tipo_torta">Torta</label>
                        <input type="radio" id="tipo_salgado" name="tipo_produto" value="salgado"> <label for="tipo_salgado">Salgados</label>
                    </div>

                    <label for="sabor">🍫 Sabor/Recheio:</label>
                    <select id="sabor" name="sabor" required>
                        <option value="">-- Selecione --</option>
                        <option value="chocolate">Chocolate</option>
                        <option value="morango">Morango</option>
                        <option value="baunilha">Baunilha</option>
                        <option value="frango">Frango c/ Catupiry (Salgado)</option>
                    </select><br><br>

                    <label>📏 Tamanho:</label>
                    <div style="margin-bottom: 15px;">
                        <input type="radio" id="tam_p" name="tamanho" value="pequeno" required> <label for="tam_p">Pequeno</label>
                        <input type="radio" id="tam_m" name="tamanho" value="medio"> <label for="tam_m">Médio</label>
                        <input type="radio" id="tam_g" name="tamanho" value="grande"> <label for="tam_g">Grande</label>
                    </div>

                    <label for="data_entrega">📅 Data de entrega:</label>
                    <input type="date" id="data_entrega" name="data_entrega" required>
                </fieldset>

                <fieldset>
                    <legend>Seção 3 - Informações Adicionais</legend>
                    <label for="obs">📝 Observações especiais:</label>
                    <textarea id="obs" name="obs" rows="4" placeholder="Alguma restrição alimentar ou detalhe estético?"></textarea>
                    
                    <label for="orcamento">💵 Orçamento máximo (R$):</label>
                    <input type="number" id="orcamento" name="orcamento" min="0" step="0.50" placeholder="Ex: 150.00">
                </fieldset>

                <div class="botoes-form">
                    <input type="submit" value="Fazer Pedido">
                    <input type="reset" value="Limpar">
                </div>
            </form>
        </section>
    </main>
    <footer><p>&copy; 2026 Padaria do Bairro - Agência Weedoo.</p></footer>
</body>
</html>
